[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[functions]]
  path = "/api/submit"
  included_files = ["netlify/functions/submit.js"]

[functions."submit"]
  timeout = 26

[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 200

[[redirects]]
  from = "/role"
  to = "/role.html"
  status = 200

[[redirects]]
  from = "/fit"
  to = "/fit.html"
  status = 200
